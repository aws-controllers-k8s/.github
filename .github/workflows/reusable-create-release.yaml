name: Create Release

on:
  workflow_call: {}

permissions:
  contents: write # For creating releases

jobs:
  reusable_workflow_job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true